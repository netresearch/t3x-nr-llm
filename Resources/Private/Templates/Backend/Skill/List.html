<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <div>
        <h1>
            <core:icon identifier="module-nrllm-skill" size="medium" />
            <f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.list.title" default="Skills" />
        </h1>

        <f:be.infobox state="-1">
            <p class="mb-0"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:module.adminOnly" default="This module is admin-only. Records and actions here affect every editor using LLM features." /></p>
        </f:be.infobox>

        <div class="mb-3">
            <strong><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:seeAlso.heading" default="See also" />:</strong>
            <a href="{be:moduleLink(route: 'nrllm_playground')}" class="badge text-bg-secondary text-decoration-none"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.title" default="Tool Playground" /></a>
            <a href="{be:moduleLink(route: 'nrllm_tools')}" class="badge text-bg-secondary text-decoration-none"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:manage.title" default="Tools" /></a>
            <a href="{be:moduleLink(route: 'nrllm_overview', arguments: '{action: \'help\'}')}" class="badge text-bg-secondary text-decoration-none"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:seeAlso.help" default="Open Help" /></a>
            <a href="https://docs.typo3.org/p/netresearch/nr-llm/main/en-us/" target="_blank" rel="noopener" class="badge text-bg-info text-decoration-none"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:seeAlso.docs" default="Read the documentation" /></a>
        </div>

        <f:render partial="Backend/Glossary" />

        <f:be.infobox state="-2">
            <p><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.intro.line1" default="Add GitHub-hosted skill sources (a single SKILL.md file, a repository, or a marketplace index), then synchronise them. Skills are fetched by immutable commit SHA, integrity-checksummed and host-allowlisted." /></p>
            <p class="mb-0"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.intro.line2" default="Skills discovered from repositories and marketplaces are materialised disabled by default. Re-syncing an enabled skill whose body changed upstream auto-disables it for review." /></p>
        </f:be.infobox>

        <h2><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.sources.heading" default="Sources" /></h2>
        <f:if condition="{sources -> f:count()}">
            <f:then>
                <div class="card mb-4">
                    <div class="card-body p-0">
                        <table class="table table-striped table-hover mb-0">
                            <thead>
                                <tr>
                                    <th scope="col"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.field.title" default="Title" /></th>
                                    <th scope="col"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.field.type" default="Type" /></th>
                                    <th scope="col"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.field.syncStatus" default="Sync status" /></th>
                                    <th scope="col"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.field.lastSynced" default="Last synced" /></th>
                                    <th scope="col" style="width: 200px;"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:actions" default="Actions" /></th>
                                </tr>
                            </thead>
                            <tbody>
                                <f:for each="{sources}" as="source">
                                    <tr data-source-uid="{source.uid}">
                                        <td><strong>{source.title}</strong></td>
                                        <td><span class="badge text-bg-info">{source.type}</span></td>
                                        <td>
                                            <f:switch expression="{source.syncStatus}">
                                                <f:case value="ok"><span class="badge text-bg-success"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.syncStatus.ok" default="Synced" /></span></f:case>
                                                <f:case value="never_synced"><span class="badge text-bg-secondary"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.syncStatus.never" default="Never synced" /></span></f:case>
                                                <f:case value="syncing"><span class="badge text-bg-info"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.syncStatus.syncing" default="Syncing" /></span></f:case>
                                                <f:case value="partial"><span class="badge text-bg-warning"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.syncStatus.partial" default="Partial" /></span></f:case>
                                                <f:case value="error"><span class="badge text-bg-danger"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.syncStatus.error" default="Failed" /></span></f:case>
                                                <f:defaultCase><code>{source.syncStatus}</code></f:defaultCase>
                                            </f:switch>
                                        </td>
                                        <td>
                                            <f:if condition="{source.lastSynced} > 0">
                                                <f:then><f:format.date date="@{source.lastSynced}" format="Y-m-d H:i" /></f:then>
                                                <f:else><span class="text-body-secondary"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.lastSynced.never" default="never" /></span></f:else>
                                            </f:if>
                                        </td>
                                        <td>
                                            <div class="btn-group btn-group-sm">
                                                <a href="{sourceEditUrls.{source.uid}}" class="btn btn-secondary" title="{f:translate(key: 'LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.source.edit', default: 'Edit source')}" aria-label="{f:translate(key: 'LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.source.edit', default: 'Edit source')}">
                                                    <core:icon identifier="actions-open" size="small" />
                                                </a>
                                                <button type="button" class="btn btn-secondary js-skill-sync"
                                                        data-source="{source.uid}" title="{f:translate(key: 'LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.action.sync', default: 'Sync')}">
                                                    <core:icon identifier="actions-refresh" size="small" /> <f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.action.sync" default="Sync" />
                                                </button>
                                                <button type="button" class="btn btn-secondary js-skill-token"
                                                        data-source="{source.uid}" title="{f:translate(key: 'LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.action.token', default: 'Set GitHub token')}">
                                                    <core:icon identifier="actions-key" size="small" /> <f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.action.token" default="Token" />
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                </f:for>
                            </tbody>
                        </table>
                    </div>
                </div>
            </f:then>
            <f:else>
                <f:be.infobox title="{f:translate(key: 'LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.sources.empty.title', default: 'No skill sources configured')}" state="-1">
                    <p><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.sources.empty.message" default="No skill sources have been added yet. Create a source record to ingest skills from GitHub." /></p>
                    <p class="mb-1"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.sources.empty.admin" default="Administrators: add a source record, then run a sync. Discovered skills start disabled — enable the ones you want to use." /></p>
                    <p class="mb-0 text-body-secondary"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.sources.empty.developer" default="Developers: a source points at a GitHub-hosted SKILL.md file, repository or marketplace index." /></p>
                </f:be.infobox>
            </f:else>
        </f:if>

        <h2><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.skills.heading" default="Skills" /></h2>
        <f:if condition="{skills -> f:count()}">
            <f:then>
                <div class="card mb-4">
                    <div class="card-body p-0">
                        <table class="table table-striped table-hover mb-0">
                            <thead>
                                <tr>
                                    <th scope="col"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.field.name" default="Name" /></th>
                                    <th scope="col"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.field.support" default="Support" /></th>
                                    <th scope="col"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.field.state" default="State" /></th>
                                    <th scope="col" style="width: 160px;"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:actions" default="Actions" /></th>
                                </tr>
                            </thead>
                            <tbody>
                                <f:for each="{skills}" as="skill">
                                    <tr class="{f:if(condition: '!{skill.isEnabled}', then: 'table-secondary')}" data-skill-uid="{skill.uid}">
                                        <td>
                                            <strong>{skill.name}</strong>
                                            <f:if condition="{skill.description}">
                                                <br><small class="text-muted">{skill.description}</small>
                                            </f:if>
                                        </td>
                                        <td>
                                            <f:if condition="{skill.supportStatus} == 'full'">
                                                <f:then><span class="badge text-bg-success"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.support.full" default="Full" /></span></f:then>
                                                <f:else><span class="badge text-bg-warning" title="{skill.unsupportedNotes}"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.support.partial" default="Partial" /></span></f:else>
                                            </f:if>
                                        </td>
                                        <td>
                                            <f:if condition="{skill.isOrphaned}">
                                                <span class="badge text-bg-danger"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.state.orphaned" default="Orphaned" /></span>
                                            </f:if>
                                            <f:if condition="{skill.isEnabled}">
                                                <f:then><span class="badge text-bg-success"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.state.enabled" default="Enabled" /></span></f:then>
                                                <f:else><span class="badge text-bg-secondary"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.state.disabled" default="Disabled" /></span></f:else>
                                            </f:if>
                                        </td>
                                        <td>
                                            <div class="btn-group btn-group-sm">
                                                <f:variable name="toggleLabel" value="{f:if(condition: skill.isEnabled, then: '{f:translate(key: \'LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.action.disable\', default: \'Disable\')}', else: '{f:translate(key: \'LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.action.enable\', default: \'Enable\')}')}" />
                                                <button type="button" class="btn btn-secondary js-skill-toggle"
                                                        data-skill="{skill.uid}"
                                                        data-enabled="{f:if(condition: skill.isEnabled, then: '1', else: '0')}"
                                                        title="{toggleLabel}"
                                                        aria-label="{toggleLabel}">
                                                    <f:if condition="{skill.isEnabled}">
                                                        <f:then><core:icon identifier="actions-toggle-on" size="small" /></f:then>
                                                        <f:else><core:icon identifier="actions-toggle-off" size="small" /></f:else>
                                                    </f:if>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                </f:for>
                            </tbody>
                        </table>
                    </div>
                </div>
            </f:then>
            <f:else>
                <f:be.infobox title="{f:translate(key: 'LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.skills.empty.title', default: 'No skills ingested')}" state="-1">
                    <p><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.skills.empty.message" default="No skills have been ingested yet. Add a source and run a sync." /></p>
                    <p class="mb-0"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:skill.skills.empty.admin" default="Administrators: once a source is synced, enable a skill here to make it available." /></p>
                </f:be.infobox>
            </f:else>
        </f:if>
    </div>
</f:section>

</html>
