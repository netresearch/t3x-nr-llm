<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">
    <div id="nrllm-tool-management">
        <h1>
            <core:icon identifier="module-nrllm-tool" size="medium" />
            <f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:manage.title" default="Tools" />
        </h1>

        <f:be.infobox state="-2">
            <p class="mb-0"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:manage.intro" default="Enable or disable the tools available to the agent tool loop. A disabled tool is refused on every run, everywhere — the runtime gate is fail-closed. This module is admin-only." /></p>
        </f:be.infobox>

        <div class="mb-3">
            <strong><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:seeAlso.heading" default="See also" />:</strong>
            <a href="{be:moduleLink(route: 'nrllm_playground')}" class="badge text-bg-secondary text-decoration-none"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:seeAlso.playground" default="Tool Playground" /></a>
            <a href="{be:moduleLink(route: 'nrllm_configurations')}" class="badge text-bg-secondary text-decoration-none"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:configuration.list.title" default="Configurations" /></a>
            <a href="{be:moduleLink(route: 'nrllm_overview', arguments: '{action: \'help\'}')}" class="badge text-bg-secondary text-decoration-none"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:seeAlso.help" default="Open Help" /></a>
            <a href="https://docs.typo3.org/p/netresearch/nr-llm/main/en-us/" target="_blank" rel="noopener" class="badge text-bg-info text-decoration-none"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:seeAlso.docs" default="Read the documentation" /></a>
        </div>

        <f:render partial="Backend/Glossary" />

        <div class="row">
            <div class="col-md-7">
                <h2><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.tools" default="Available tools" /></h2>
                <f:if condition="{f:count(subject: toolStates)}">
                    <f:then>
                        <f:groupedFor each="{toolStates}" as="groupTools" groupBy="group" groupKey="groupName">
                        <div class="card mb-4">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <div>
                                    <strong><core:icon identifier="actions-folder" size="small" /> <code>{groupName}</code></strong>
                                    <f:if condition="{groupStates.{groupName}.enabled}">
                                        <f:then>
                                            <span class="badge bg-success"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.tool.enabled" default="Enabled" /></span>
                                        </f:then>
                                        <f:else>
                                            <span class="badge bg-secondary">✕ <f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.tool.disabled" default="Disabled" /></span>
                                            <small class="text-body-secondary ms-2"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:group.disabledHint" default="All tools of this group are refused; per-tool toggles have no effect while the group is disabled." /></small>
                                        </f:else>
                                    </f:if>
                                </div>
                                <button type="button"
                                        class="btn btn-sm js-toolgroup-toggle {f:if(condition: groupStates.{groupName}.enabled, then: 'btn-outline-secondary', else: 'btn-outline-success')}"
                                        data-group="{groupName}"
                                        data-enabled="{f:if(condition: groupStates.{groupName}.enabled, then: '1', else: '0')}">
                                    <f:if condition="{groupStates.{groupName}.enabled}">
                                        <f:then><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:group.disable" default="Disable group" /></f:then>
                                        <f:else><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:group.enable" default="Enable group" /></f:else>
                                    </f:if>
                                </button>
                            </div>
                            <ul class="list-group list-group-flush">
                                <f:for each="{groupTools}" as="tool">
                                    <li class="list-group-item d-flex justify-content-between align-items-start">
                                        <div class="me-3">
                                            <strong><code>{tool.name}</code></strong>
                                            <f:if condition="{tool.enabled}">
                                                <f:then>
                                                    <span class="badge bg-success"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.tool.enabled" default="Enabled" /></span>
                                                </f:then>
                                                <f:else>
                                                    <span class="badge bg-secondary"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.tool.disabled" default="Disabled" /></span>
                                                </f:else>
                                            </f:if>
                                            <f:if condition="{tool.overridden}">
                                                <f:then>
                                                    <span class="badge bg-info"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.tool.overridden" default="Override" /></span>
                                                </f:then>
                                                <f:else>
                                                    <span class="badge bg-light text-dark"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.tool.default" default="Default" /></span>
                                                </f:else>
                                            </f:if>
                                            <f:if condition="{tool.description}">
                                                <br><small class="text-body-secondary">{tool.description}</small>
                                            </f:if>
                                        </div>
                                        <button type="button"
                                                class="btn btn-sm js-tool-toggle {f:if(condition: tool.toolEnabled, then: 'btn-outline-secondary', else: 'btn-outline-success')}"
                                                data-tool="{tool.name}"
                                                data-enabled="{f:if(condition: tool.toolEnabled, then: '1', else: '0')}">
                                            <f:if condition="{tool.toolEnabled}">
                                                <f:then><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.tool.disable" default="Disable" /></f:then>
                                                <f:else><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.tool.enable" default="Enable" /></f:else>
                                            </f:if>
                                        </button>
                                    </li>
                                </f:for>
                            </ul>
                        </div>
                        </f:groupedFor>
                    </f:then>
                    <f:else>
                        <f:be.infobox state="-1">
                            <p class="mb-1"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.empty" default="No tools are registered. Add a tool by tagging a ToolInterface implementation with nr_llm.tool." /></p>
                            <p class="mb-0 text-body-secondary"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang.xlf:playground.empty.developer" default="Developers: implement Netresearch\NrLlm\Service\Tool\ToolInterface and tag it with nr_llm.tool to register a new tool." /></p>
                        </f:be.infobox>
                    </f:else>
                </f:if>
            </div>

            <div class="col-md-5">
                <h2><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.help.title" default="How to add a tool" /></h2>
                <div class="card mb-4">
                    <div class="card-body">
                        <p><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.help.intro" default="Tools are auto-discovered PHP classes — no manual registration is needed." /></p>
                        <ol class="mb-3">
                            <li>
                                <f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.help.step.interface" default="Implement Netresearch\NrLlm\Service\Tool\ToolInterface (getSpec + execute + isEnabledByDefault)." />
                            </li>
                            <li>
                                <f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.help.step.tag" default="The class is auto-discovered via the nr_llm.tool DI tag — there is nothing else to register." />
                            </li>
                            <li>
                                <f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.help.step.template" default="Copy Classes/Service/Tool/Builtin/FetchLogsTool.php as a starting template." />
                            </li>
                        </ol>
                        <f:be.infobox state="-1">
                            <p class="mb-0"><f:translate key="LLL:EXT:nr_llm/Resources/Private/Language/locallang_mod_tool.xlf:playground.help.security" default="A tool runs with full backend privileges and its result egresses to the LLM provider. Keep it admin-only and read-only, scope and validate every argument, and never expose secrets." /></p>
                        </f:be.infobox>
                    </div>
                </div>
            </div>
        </div>
    </div>
</f:section>

</html>
