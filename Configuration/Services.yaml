# Service configuration for nr-llm extension
#
# This file defines dependency injection for AI/LLM services

services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  # ========================================
  # Namespace Auto-registration
  # ========================================
  # Note: PSR-17 HTTP factories (RequestFactoryInterface, StreamFactoryInterface)
  # are provided by TYPO3 Core via TYPO3\CMS\Core\Http\RequestFactory and StreamFactory

  Netresearch\NrLlm\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Attribute/*'
      - '../Classes/Domain/Model/*'
      - '../Classes/Provider/Exception/*'
      # Newable rank-fusion math (ADR-074): consumers construct it, no DI.
      - '../Classes/Service/Retrieval/ReciprocalRankFusion.php'
      - '../Classes/Service/Agent/Exception/*'
      - '../Classes/Service/Rerank/Exception/*'
      # Scalar-argument constructor; built exclusively by RerankerFactory.
      - '../Classes/Service/Rerank/HttpReranker.php'
      - '../Classes/Service/SetupWizard/Exception/*'
      - '../Classes/Service/Skill/Exception/*'
      - '../Classes/Specialized/Exception/*'
      - '../Classes/Testing/*'
      - '../Classes/Widgets/*'

  # ========================================
  # Core Services (PUBLIC)
  # ========================================

  Netresearch\NrLlm\Service\LlmServiceManager:
    public: true

  Netresearch\NrLlm\Service\LlmServiceManagerInterface:
    alias: Netresearch\NrLlm\Service\LlmServiceManager
    public: true

  Netresearch\NrLlm\Service\CacheManagerInterface:
    alias: Netresearch\NrLlm\Service\CacheManager
    public: true

  Netresearch\NrLlm\Service\TestPromptResolverInterface:
    alias: Netresearch\NrLlm\Service\TestPromptResolverService

  Netresearch\NrLlm\Service\UsageTrackerServiceInterface:
    alias: Netresearch\NrLlm\Service\UsageTrackerService
    public: true

  Netresearch\NrLlm\Service\Tool\ToolLoopServiceInterface:
    alias: Netresearch\NrLlm\Service\Tool\ToolLoopService
    public: true

  # The agent-run application service (ADR-101): run / approve / cancel /
  # events / status through one fail-closed lifecycle. The preferred consumer
  # surface — scheduler tasks, queue workers and downstream extensions use
  # this; the bare ToolLoopServiceInterface above stays for consumers that
  # want the loop without persistence or approval.
  Netresearch\NrLlm\Service\Agent\AgentRuntimeInterface:
    alias: Netresearch\NrLlm\Service\Agent\AgentRuntime
    public: true

  # The composite tool gate (ADR-094): registered, enabled, permitted, within
  # the configuration's groups, within the provider trust zone's data-class
  # ceiling. Public because the backend module and functional tests ask it why
  # a tool is missing; the two resolvers behind it stay private.
  Netresearch\NrLlm\Service\Tool\ToolCallPolicyInterface:
    alias: Netresearch\NrLlm\Service\Tool\ToolCallPolicy
    public: true

  Netresearch\NrLlm\Service\UsageAnalyticsServiceInterface:
    alias: Netresearch\NrLlm\Service\UsageAnalyticsService

  Netresearch\NrLlm\Service\Retrieval\SolrHttpClientInterface:
    alias: Netresearch\NrLlm\Service\Retrieval\SolrHttpClient

  # Public keyword-search facade (ADR-071). The interface alias resolves
  # the full cascade (concrete class stays private); the named variant
  # excludes the priority-0 database LIKE fallback for consumers that
  # need "index unavailable -> empty" (e.g. hybrid dense+sparse fusion).
  Netresearch\NrLlm\Service\Retrieval\KeywordSearchInterface:
    alias: Netresearch\NrLlm\Service\Retrieval\KeywordSearchService
    public: true

  nr_llm.keyword_search.index_backed:
    class: Netresearch\NrLlm\Service\Retrieval\KeywordSearchService
    arguments:
      $indexBackedOnly: true
    public: true

  # Cross-encoder reranker protocol (ADR-075). Built via a factory so the
  # instance-configured sidecar endpoint selects the implementation: an
  # empty rerankerEndpoint keeps candidates in input order (NullReranker),
  # a configured endpoint enables the sidecar client (HttpReranker).
  # Public: documented downstream retrieval contract (e.g. nr_ai_search).
  Netresearch\NrLlm\Service\Rerank\RerankerInterface:
    factory: ['@Netresearch\NrLlm\Service\Rerank\RerankerFactory', 'create']
    public: true

  Netresearch\NrLlm\Specialized\Translation\TranslatorRegistryInterface:
    alias: Netresearch\NrLlm\Specialized\Translation\TranslatorRegistry
    public: true

  # ========================================
  # Providers (private; resolved via LlmServiceManager)
  # ========================================
  # Provider registration and priority are declared via the
  # #[AsLlmProvider(priority: N)] attribute on each provider class.
  # ProviderCompilerPass scans for the attribute and tags matching
  # services automatically. Providers stay PRIVATE — nothing resolves a
  # provider by class name from the container; all access is via
  # LlmServiceManager::getProvider(), which keeps the documented public
  # service set stable (ADR-028 / PublicServicesPolicyTest).
  # Services.yaml `tags:` entries still work for third-party providers and
  # take precedence if both are present.

  # ========================================
  # Provider Adapter Registry (database-backed providers)
  # ========================================

  Netresearch\NrLlm\Provider\ProviderAdapterRegistry:
    public: true

  Netresearch\NrLlm\Provider\ProviderAdapterRegistryInterface:
    alias: Netresearch\NrLlm\Provider\ProviderAdapterRegistry
    public: true

  # ========================================
  # Feature Services (PUBLIC)
  # ========================================

  Netresearch\NrLlm\Service\Feature\CompletionService:
    public: true

  Netresearch\NrLlm\Service\Feature\CompletionServiceInterface:
    alias: Netresearch\NrLlm\Service\Feature\CompletionService
    public: true

  # Stateful conversation service (ADR-083) — public feature surface, like the
  # other completion services.
  Netresearch\NrLlm\Service\Feature\ConversationService:
    public: true

  Netresearch\NrLlm\Service\Feature\ConversationServiceInterface:
    alias: Netresearch\NrLlm\Service\Feature\ConversationService
    public: true

  Netresearch\NrLlm\Service\Feature\VisionService:
    public: true

  Netresearch\NrLlm\Service\Feature\VisionServiceInterface:
    alias: Netresearch\NrLlm\Service\Feature\VisionService
    public: true

  Netresearch\NrLlm\Service\Feature\EmbeddingService:
    public: true

  Netresearch\NrLlm\Service\Feature\EmbeddingServiceInterface:
    alias: Netresearch\NrLlm\Service\Feature\EmbeddingService
    public: true

  Netresearch\NrLlm\Service\Feature\TranslationService:
    public: true

  Netresearch\NrLlm\Service\Feature\TranslationServiceInterface:
    alias: Netresearch\NrLlm\Service\Feature\TranslationService
    public: true

  Netresearch\NrLlm\Service\Feature\ToolCallingService:
    public: true

  Netresearch\NrLlm\Service\Feature\ToolCallingServiceInterface:
    alias: Netresearch\NrLlm\Service\Feature\ToolCallingService
    public: true

  # ========================================
  # Supporting Services (interface aliases stay public; concretes private)
  # ========================================
  # The concrete supporting services (CacheManager, UsageTrackerService,
  # UsageAnalyticsService, LlmConfigurationService)
  # are autoregistered PRIVATE by the namespace block above. Consumers
  # wire against the public interface alias; the interface aliases below
  # (and CacheManager/UsageTrackerService interfaces in the Core section)
  # stay public so the DI contract holds. Functional tests that resolve a
  # concrete by class name go through the testing-framework private
  # container (ADR-062, supersedes ADR-028). PromptSnippetComposer has no
  # interface and is the documented ADR-031 snippet surface, so it stays
  # public as a concrete.

  Netresearch\NrLlm\Service\Prompt\PromptSnippetComposer:
    public: true

  Netresearch\NrLlm\Service\LlmConfigurationServiceInterface:
    alias: Netresearch\NrLlm\Service\LlmConfigurationService
    public: true

  # ========================================
  # Supporting service interfaces (private)
  # ========================================
  # Aliases that let consumers wire against the interface rather than the
  # concrete class. The concrete services are auto-registered as private
  # by the namespace resource block above; these aliases declare the same
  # visibility explicitly (REC #9b — supporting interface extraction) so it
  # stays private regardless of the target service's own visibility.

  Netresearch\NrLlm\Service\ModelSelectionServiceInterface:
    alias: Netresearch\NrLlm\Service\ModelSelectionService
    public: false

  Netresearch\NrLlm\Service\CapabilityPermissionServiceInterface:
    alias: Netresearch\NrLlm\Service\CapabilityPermissionService
    public: false

  Netresearch\NrLlm\Service\WizardGeneratorServiceInterface:
    alias: Netresearch\NrLlm\Service\WizardGeneratorService
    public: false

  Netresearch\NrLlm\Specialized\Pricing\SpecializedCostCalculatorInterface:
    alias: Netresearch\NrLlm\Specialized\Pricing\SpecializedCostCalculator
    public: false

  # Telemetry recorder (ADR-058) — private; used by TelemetryMiddleware and the
  # nrllm:telemetry:purge command. The concrete repository stays private too;
  # functional tests instantiate it directly with the real ConnectionPool.
  Netresearch\NrLlm\Service\Telemetry\TelemetryRepositoryInterface:
    alias: Netresearch\NrLlm\Service\Telemetry\TelemetryRepository
    public: false

  # Agent-run persistence (ADR-081) — private; consumed by AgentRunPersister,
  # which the tool playground drives. The concrete repository stays private too;
  # functional tests instantiate it directly with the real ConnectionPool.
  Netresearch\NrLlm\Service\Tool\AgentRunRepositoryInterface:
    alias: Netresearch\NrLlm\Service\Tool\AgentRunRepository
    public: false

  # Conversation session store (ADR-083) — private; consumed by ConversationService
  # and the nrllm:session:purge command. The concrete repository stays private too;
  # functional tests instantiate it directly with the real ConnectionPool.
  Netresearch\NrLlm\Service\Session\AiSessionRepositoryInterface:
    alias: Netresearch\NrLlm\Service\Session\AiSessionRepository
    public: false

  # Circuit breaker state store (ADR-063) — private; consumed by
  # CircuitBreakerMiddleware. The cache-backed default is instantiated directly
  # in its functional test with the real core cache manager.
  Netresearch\NrLlm\Provider\CircuitBreaker\CircuitBreakerStoreInterface:
    alias: Netresearch\NrLlm\Provider\CircuitBreaker\CacheCircuitBreakerStore
    public: false

  # Provider health advisor (ADR-063) — private; consulted by FallbackMiddleware
  # for the opt-in health-aware fallback reorder. The telemetry-reading
  # repository stays private too (analytics read path, like the recorder).
  Netresearch\NrLlm\Service\Health\ProviderHealthServiceInterface:
    alias: Netresearch\NrLlm\Service\Health\ProviderHealthService
    public: false

  Netresearch\NrLlm\Service\Health\ProviderHealthRepositoryInterface:
    alias: Netresearch\NrLlm\Service\Health\ProviderHealthRepository
    public: false

  # Quality-evaluation subsystem (ADR-060). Everything here is private:
  # the persistence layer is instantiated directly in its functional test
  # (its only dependency is ConnectionPool), the command is made public by
  # the console.command tag below, and the golden-set provider interface is
  # discovered via the nr_llm.golden_prompt_set tag (AutoconfigureTag).
  Netresearch\NrLlm\Service\Evaluation\EvaluationResultRepositoryInterface:
    alias: Netresearch\NrLlm\Service\Evaluation\EvaluationResultRepository
    public: false

  Netresearch\NrLlm\Service\Evaluation\ModelQualityScoreProviderInterface:
    alias: Netresearch\NrLlm\Service\Evaluation\EvaluationQualityScoreProvider
    public: false

  # Central privacy model (ADR-064) — the single policy read at every content
  # sink and by the nrllm:privacy:purge command. Private: it is a constructor
  # collaborator, never resolved by class name from the container.
  Netresearch\NrLlm\Service\Privacy\PrivacyPolicyInterface:
    alias: Netresearch\NrLlm\Service\Privacy\PrivacyPolicy
    public: false

  # ========================================
  # Repositories (private)
  # ========================================
  # Repositories are autoregistered PRIVATE by the namespace block above.
  # They are injected via constructor DI in production; the functional and
  # backend-E2E tests that resolve them by class name do so through the
  # testing-framework private container (PrivateContainerWeakRefPass makes
  # every private service resolvable via FunctionalTestCase::get()), so no
  # public override is needed (ADR-062, supersedes ADR-028 Category 3).
  # PromptSnippetRepository's documented ADR-031 query surface for
  # consuming extensions is exposed via the public PromptSnippetComposer,
  # not the repository itself.

  Netresearch\NrLlm\Service\Skill\GitHubClientInterface:
    alias: Netresearch\NrLlm\Service\Skill\GitHubClient

  # Skill audit trail (ADR-061); the nrllm:privacy:purge command (ADR-064) wires
  # against the interface for its retention purge. Private — functional tests
  # instantiate the concrete directly with the real ConnectionPool.
  Netresearch\NrLlm\Service\Skill\SkillAuditRepositoryInterface:
    alias: Netresearch\NrLlm\Service\Skill\SkillAuditRepository
    public: false

  # Built via a factory so the instance-configured minimum skill trust level
  # (skills.minTrustLevel, ADR-061) is applied. Stays private — the composer is
  # an internal collaborator of the injection and allowed-tools paths.
  Netresearch\NrLlm\Service\Skill\SkillComposer:
    factory: ['@Netresearch\NrLlm\Service\Skill\SkillComposerFactory', 'create']

  # Public so functional tests can fetch registered tools by spec name
  # (the tools themselves stay private; ADR-042).
  Netresearch\NrLlm\Service\Tool\ToolRegistry:
    public: true

  # Public so the TCA itemsProcFunc (GuardrailItems) can list the selectable
  # guardrails via GeneralUtility::makeInstance (ADR-106).
  Netresearch\NrLlm\Service\Guardrail\GuardrailRegistry:
    public: true

  Netresearch\NrLlm\Service\Tool\ToolAvailabilityServiceInterface:
    alias: Netresearch\NrLlm\Service\Tool\ToolAvailabilityService

  # Concrete BudgetService is private (autoregistered); consumers wire
  # against the public BudgetServiceInterface alias.
  Netresearch\NrLlm\Service\BudgetServiceInterface:
    alias: Netresearch\NrLlm\Service\BudgetService
    public: true

  Netresearch\NrLlm\Service\Budget\BudgetUsageWindowsInterface:
    alias: Netresearch\NrLlm\Service\Budget\UserBudgetUsageWindows

  Netresearch\NrLlm\Service\Budget\BackendUserContextResolverInterface:
    alias: Netresearch\NrLlm\Service\Budget\BackendUserContextResolver

  # ========================================
  # Task pathway readers (slice 13a — ADR-027)
  # ========================================

  Netresearch\NrLlm\Service\Task\RecordTableReaderInterface:
    alias: Netresearch\NrLlm\Service\Task\RecordTableReader

  Netresearch\NrLlm\Service\Task\SystemLogReaderInterface:
    alias: Netresearch\NrLlm\Service\Task\SystemLogReader

  Netresearch\NrLlm\Service\Task\DeprecationLogReaderInterface:
    alias: Netresearch\NrLlm\Service\Task\DeprecationLogReader

  Netresearch\NrLlm\Service\Task\TaskInputResolverInterface:
    alias: Netresearch\NrLlm\Service\Task\TaskInputResolver

  Netresearch\NrLlm\Service\Task\TaskExecutionServiceInterface:
    alias: Netresearch\NrLlm\Service\Task\TaskExecutionService

  # ========================================
  # Translation Registry
  # ========================================
  # Concrete TranslatorRegistry is private (autoregistered); consumers wire
  # against the public TranslatorRegistryInterface alias (Core section).

  # ========================================
  # Specialized Translators
  # ========================================
  # Translators are marked with #[AsTranslator] on the class.
  # TranslatorCompilerPass scans for the attribute and auto-tags matching
  # services with `nr_llm.translator`. Translator identifier and ordering
  # priority live on the TranslatorInterface methods (`getIdentifier()`,
  # `getPriority()`); TranslatorRegistry consumes the tagged iterable via
  # #[TaggedIterator(defaultPriorityMethod: 'getPriority')]. Services
  # remain private — the registry never resolves them by class name.
  # Services.yaml `tags:` entries still work for third-party translators
  # outside the Netresearch\NrLlm\Specialized\Translation\ namespace.

  # ========================================
  # Speech Services
  # ========================================

  Netresearch\NrLlm\Specialized\Speech\WhisperTranscriptionService:
    public: true

  Netresearch\NrLlm\Specialized\Speech\TextToSpeechService:
    public: true

  # ========================================
  # Image Generation Services
  # ========================================

  Netresearch\NrLlm\Specialized\Image\DallEImageService:
    public: true

  Netresearch\NrLlm\Specialized\Image\FalImageService:
    public: true

  # ========================================
  # Document Analysis Services
  # ========================================
  # DocumentAnalysisService is Category D consumer API (ADR-076). The
  # rasterizer alias stays private: consumers autowire the interface, and
  # a substitute rasterizer is wired by aliasing it to another class.

  Netresearch\NrLlm\Specialized\Document\DocumentAnalysisService:
    public: true

  Netresearch\NrLlm\Specialized\Document\PdfRasterizerInterface:
    alias: Netresearch\NrLlm\Specialized\Document\PopplerPdfRenderer

  # ========================================
  # Setup Wizard Services
  # ========================================
  # ProviderDetector stays PUBLIC: it is resolved via
  # GeneralUtility::makeInstance() in ProviderEndpointNormalizationHook
  # (a DataHandler hook, outside DI), and makeInstance() only reuses the
  # container-built instance for public services. ModelDiscovery and
  # ConfigurationGenerator are private (autoregistered) — injected via DI,
  # resolved in tests through the private container (ADR-062). The
  # ModelDiscoveryInterface alias stays for autowiring but is private;
  # tests resolve it through the private container too.

  Netresearch\NrLlm\Service\SetupWizard\ProviderDetector:
    public: true

  Netresearch\NrLlm\Service\SetupWizard\ModelDiscoveryInterface:
    alias: Netresearch\NrLlm\Service\SetupWizard\ModelDiscovery
    public: false

  # ========================================
  # Console Commands
  # ========================================
  # The console.command tag registers the command with TYPO3's
  # CommandRegistry and is made public by ConsoleCommandPass — it does not
  # add a `public: true` override to the audited surface (ADR-028 / ADR-060).

  Netresearch\NrLlm\Command\EvalRunCommand:
    tags:
      - name: 'console.command'
        command: 'nrllm:eval:run'
        description: 'Run a golden prompt set against a model and report grading and regression.'
        schedulable: false

  Netresearch\NrLlm\Command\RetrievalEvalRunCommand:
    tags:
      - name: 'console.command'
        command: 'nrllm:eval:retrieval'
        description: 'Run a golden question set against a retriever and report hit rates and regression.'
        schedulable: false

