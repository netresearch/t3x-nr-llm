name: E2E Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

permissions: {}

jobs:
  e2e:
    uses: netresearch/typo3-ci-workflows/.github/workflows/e2e.yml@main
    permissions:
      contents: read
    with:
      php-version: '8.5'
      db-image: 'mariadb:12.2'
      artifact-path: |
        Tests/E2E/Playwright/reports/
        Tests/E2E/Playwright/test-results/
