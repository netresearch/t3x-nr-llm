name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    uses: netresearch/typo3-ci-workflows/.github/workflows/release-typo3-extension.yml@v1.3.2
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      archive-prefix: nr-llm
      package-name: netresearch/nr-llm
      extension-key: nr_llm
    secrets:
      TYPO3_TER_ACCESS_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
