name: Republish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to republish (e.g. "v1.2.3"). Must be an existing tag on this repo; typo will fail after Checkout.'
        required: true
        type: string
      target:
        description: 'Which publish target(s) to re-run'
        required: true
        type: choice
        options:
          - all
          - ter
          - docs
          - packagist
        default: all

permissions: {}

jobs:
  republish:
    uses: netresearch/typo3-ci-workflows/.github/workflows/republish.yml@v1.3.2
    permissions:
      contents: read
    with:
      tag: ${{ inputs.tag }}
      target: ${{ inputs.target }}
      extension-key: nr_llm
      package-name: netresearch/nr-llm
    secrets:
      TYPO3_TER_ACCESS_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
