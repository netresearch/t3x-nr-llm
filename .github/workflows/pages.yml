name: Landing Page

on:
  push:
    branches: [main]
    paths:
      - 'landingpage/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least privilege by default; each job opts into exactly what it needs.
permissions: {}

# Allow one concurrent deployment; let a running deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Build site
        env:
          # Base path / origin come from the Pages config, so a rename or a
          # custom domain needs no code change.
          NRLLM_BASE: ${{ steps.pages.outputs.base_path }}
          NRLLM_ORIGIN: ${{ steps.pages.outputs.origin }}
        run: uv run landingpage/build/build.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: landingpage/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
