# SonarQube Cloud — Automatic Analysis configuration.
#
# This file (NOT sonar-project.properties, which Automatic Analysis ignores)
# configures the scope of SonarCloud's Automatic Analysis from the repository.
#
# Exclude vendored third-party frontend libraries (the minified Chart.js UMD
# bundle) from analysis and copy-paste/duplication detection. It is upstream
# code, not ours to scan; its minified single-line form otherwise inflates the
# "Duplication on New Code" metric and triggers false-positive findings.
sonar.exclusions=Resources/Public/JavaScript/Vendor/**
sonar.cpd.exclusions=Resources/Public/JavaScript/Vendor/**
