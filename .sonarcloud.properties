# SonarQube Cloud — Automatic Analysis configuration.
#
# This file (NOT sonar-project.properties, which Automatic Analysis ignores)
# scopes SonarCloud's Automatic Analysis from the repository.

# Exclude from ALL analysis:
#  - Vendored third-party frontend libraries (the minified Chart.js UMD bundle)
#    — upstream code, not ours to scan.
#  - Fluid templates: TYPO3 view partials wrapped in `<html xmlns:f="...">` only
#    to declare ViewHelper namespaces — they are NOT standalone HTML pages, so
#    SonarCloud's Web rules (DOCTYPE / lang attribute / <title>) are false
#    positives on them.
sonar.exclusions=Resources/Public/JavaScript/Vendor/**,Resources/Private/Templates/**

# Exclude from copy-paste / duplication detection (new_duplicated_lines_density):
#  - Vendored libs and Fluid templates (as above).
#  - XLIFF translation files — the EN source and DE target files necessarily
#    mirror each other's structure; that is translation, not duplication.
#  - Test code — repeated arrange/act/assert scaffolding is idiomatic in tests.
#  - TYPO3 TCA files and the icon registry — declarative arrays whose shape is
#    dictated by the TCA schema / icon API: every table repeats the same
#    ctrl/columns scaffolding, every icon entry the same provider/source pair.
#    The repetition is the format, not copy-paste (TYPO3 convention is one
#    plain-array file per table, see Configuration/AGENTS.md).
sonar.cpd.exclusions=Resources/Public/JavaScript/Vendor/**,Resources/Private/Templates/**,Resources/Private/Language/**,Tests/**,Configuration/TCA/**,Configuration/Icons.php

# Per-rule ignores for two inherent/intentional findings:
#  - e1 (php:S1448, "too many methods"): the Skill/SkillSource Extbase entities
#    legitimately exceed 20 methods — one getter+setter pair per persisted
#    column is the framework's mapping convention, not a design smell.
#  - e2 (php:S5332, "clear-text protocol"): GitHubClientTest deliberately uses an
#    http:// URL to assert the client REJECTS it (HostNotAllowedException).
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=php:S1448
sonar.issue.ignore.multicriteria.e1.resourceKey=Classes/Domain/Model/**
sonar.issue.ignore.multicriteria.e2.ruleKey=php:S5332
sonar.issue.ignore.multicriteria.e2.resourceKey=Tests/**
