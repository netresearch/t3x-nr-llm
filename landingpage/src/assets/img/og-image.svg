<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="nr-llm — the shared AI foundation for TYPO3">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2F99A4"/>
      <stop offset="1" stop-color="#257880"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="12" fill="url(#teal)"/>
  <circle cx="1050" cy="120" r="220" fill="#2F99A4" opacity="0.08"/>
  <circle cx="1120" cy="520" r="160" fill="#FF4D00" opacity="0.06"/>

  <g transform="translate(90, 150)">
    <rect width="96" height="96" rx="22" fill="url(#teal)"/>
    <text x="48" y="52" dominant-baseline="central" text-anchor="middle"
          font-family="'Raleway','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="52" fill="#FFFFFF">n</text>
    <rect x="20" y="70" width="56" height="7" rx="3.5" fill="#FF4D00"/>
  </g>

  <text x="92" y="330" font-family="'Raleway','Helvetica Neue',Arial,sans-serif" font-weight="700" font-size="96" fill="#4D4F57">nr-llm</text>
  <text x="92" y="400" font-family="'Open Sans',Arial,sans-serif" font-weight="600" font-size="40" fill="#15585E">The shared AI foundation for TYPO3</text>
  <text x="92" y="470" font-family="'Open Sans',Arial,sans-serif" font-weight="400" font-size="30" fill="#585961">One LLM setup. Every extension. Full admin control.</text>

  <text x="92" y="565" font-family="'Open Sans',Arial,sans-serif" font-weight="600" font-size="26" fill="#8A8B93">OpenAI · Anthropic · Gemini · Ollama · Mistral · Groq — by Netresearch</text>
